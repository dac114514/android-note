name: CI Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      gradle_tasks:
        description: 'Gradle 任务'
        required: false
        default: 'assembleDebug'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew ${{ github.event.inputs.gradle_tasks || 'assembleDebug' }}

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/reports/**/*
