name: Code Review

on:
  workflow_dispatch:
    inputs:
      gradle_tasks:
        description: '要执行的 Gradle 任务（多个用空格分隔）'
        required: true
        default: 'spotlessCheck lint --quiet'
        type: string
      
      extra_options:
        description: '额外参数（可选）'
        required: false
        default: ''
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 执行 Gradle 检查
        run: ./gradlew ${{ github.event.inputs.gradle_tasks }} ${{ github.event.inputs.extra_options }}

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

      - name: 审查完成
        run: echo "✅ 审查完成，任务：${{ github.event.inputs.gradle_tasks }}"